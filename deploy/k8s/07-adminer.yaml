# ── Deployment ────────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: adminer
  namespace: parcel-tracking
  labels:
    app: adminer
spec:
  replicas: 1
  selector:
    matchLabels:
      app: adminer
  template:
    metadata:
      labels:
        app: adminer
    spec:
      containers:
        - name: adminer
          image: adminer:latest
          ports:
            - containerPort: 8080
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
---
# ── Service — LoadBalancer so Docker Desktop exposes on localhost:8080 ──
apiVersion: v1
kind: Service
metadata:
  name: adminer
  namespace: parcel-tracking
spec:
  type: LoadBalancer
  selector:
    app: adminer
  ports:
    - port: 8080
      targetPort: 8080
