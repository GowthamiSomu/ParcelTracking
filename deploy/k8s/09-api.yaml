# ── Deployment ────────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api
  namespace: parcel-tracking
  labels:
    app: api
spec:
  replicas: 1
  selector:
    matchLabels:
      app: api
  template:
    metadata:
      labels:
        app: api
    spec:
      initContainers:
        # Wait for SQL Server before serving traffic (API reads from it)
        - name: wait-for-sql
          image: busybox:1.36
          command: ['sh', '-c', 'until nc -zw 3 sqlserver 1433; do echo "Waiting for SQL Server..."; sleep 3; done']
      containers:
        - name: api
          # Image built by: docker compose build api
          image: parceltracking-api:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
          env:
            - name: DOTNET_ENVIRONMENT
              value: Production
            - name: ConnectionStrings__SqlServer
              valueFrom:
                secretKeyRef:
                  name: parcel-secrets
                  key: sqlserver-connection
            - name: ConnectionStrings__Redis
              valueFrom:
                secretKeyRef:
                  name: parcel-secrets
                  key: redis-connection
            - name: ConnectionStrings__ServiceBus
              valueFrom:
                secretKeyRef:
                  name: parcel-secrets
                  key: servicebus-connection
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          readinessProbe:
            httpGet:
              path: /healthz/ready
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 5
            failureThreshold: 10
          livenessProbe:
            httpGet:
              path: /healthz/live
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 15
---
# ── Service — LoadBalancer so Docker Desktop exposes on localhost:5058 ──
apiVersion: v1
kind: Service
metadata:
  name: api
  namespace: parcel-tracking
spec:
  type: LoadBalancer
  selector:
    app: api
  ports:
    - port: 5058
      targetPort: 8080
